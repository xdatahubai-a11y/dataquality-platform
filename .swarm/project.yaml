project:
  name: "dataquality-platform"
  repo: "xdatahubai-a11y/dataquality-platform"
  language: python
  package_manager: pip
  setup_command: "python3 -m venv .venv 2>/dev/null; .venv/bin/pip install -q fastapi uvicorn sqlalchemy pydantic pydantic-settings pyyaml httpx pytest pytest-asyncio alembic"

agents:
  default:
    agent: claude
    model: claude-sonnet-4-6

  rules:
    - match:
        type: feature
        complexity: large
      agent: claude
      model: claude-opus-4-6

    - match:
        type: bugfix
        complexity: small
      agent: claude
      model: claude-sonnet-4-6

    - match:
        type: feature
      agent: claude
      model: claude-sonnet-4-6

quality_gate:
  ci:
    required: true
    ignore_checks:
      - "build-dashboard"
      - "deploy"
      - test-api
  reviewers:
    enabled: true
    agent: claude
    model: claude-sonnet-4-6
    personas:
      - name: security
        label: "Security & Correctness"
        template: review-security.md
      - name: architecture
        label: "Architecture & Design"
        template: review-architecture.md
      - name: testing
        label: "Testing & Edge Cases"
        template: review-testing.md
  min_reviews_pass: 2

monitor:
  interval: 10m
  max_attempts: 3
  stall_timeout_min: 15

worktrees:
  base_dir: "../worktrees"
  base_branch: "origin/main"
  cleanup_after_merge: true

notifications:
  telegram:
    bot_token: ""   # Set to enable direct Telegram alerts (or use TELEGRAM_BOT_TOKEN env var)
    chat_id: ""     # Your Telegram user ID (or use TELEGRAM_CHAT_ID env var)
